version: "3.8"
name: {{COMPOSE_PROJECT_NAME}}

services:
  {{SERVICE_NAME}}:
    image: {{IMAGE}}
{{COMMAND_BLOCK}}    environment:
{{ENVIRONMENT_BLOCK}}    volumes:
      - {{VOLUME_KEY}}:{{DATA_PATH}}
{{PORTS_BLOCK}}    networks:
      - projectnet
    healthcheck:
      test: ["CMD-SHELL", "{{HEALTHCHECK_CMD}}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
{{RESOURCE_LIMITS_BLOCK}}      labels:
{{DEPLOY_LABELS_BLOCK}}

volumes:
  {{VOLUME_KEY}}:
    name: {{VOLUME_NAME}}
    labels:
      otterstack.managed: "true"
{{VOLUME_LABELS_BLOCK}}

networks:
  projectnet:
    external: true
    name: {{NETWORK_NAME}}
