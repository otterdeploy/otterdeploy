# otterdeploy — PRODUCTION stack (published images)
# =================================================
# This is the image-based compose the installer fetches to a host and runs with
#   docker compose -f docker-compose.yml --env-file .env up -d
# It is the published counterpart of the dev docker-compose.yml (which builds
# from source). Differences that matter:
#   - every service is a PINNED published image (${OTTERDEPLOY_VERSION}); no build.
#   - includes the `server` control plane (dashboard/API on ${CONTROL_PLANE_PORT}).
#   - all services join the shared EXTERNAL `otterdeploy` network the installer
#     created (see `networks:` at the bottom).
#   - the `firewall` profile (CrowdSec) is preserved, still opt-in.
#   - 5432 is intentionally NOT published — the control plane reaches its own
#     Postgres over the container network; databases are never exposed on the host.
#
# All values come from the installer-generated .env (OTTERDEPLOY_VERSION,
# POSTGRES_*, DATABASE_URL, REDIS_URL, BETTER_AUTH_SECRET, OTTERDEPLOY_DATA_DIR,
# CONTROL_PLANE_PORT, BRANCH_ZFS_POOL, …). Image registry overridable via
# OTTERDEPLOY_REGISTRY (default ghcr.io/otterdeploy).

name: otterdeploy

services:
  # ── control-plane datastore ───────────────────────────────────────────────
  postgres:
    # Pinned to 17 — postgres:18+ refuses our /var/lib/postgresql/data mount
    # (matches the pin in packages/api/src/constants.ts and the db engines).
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-otterdeploy}
      # Always written by the installer; the postgres image itself rejects an
      # empty password, so no `:?` guard (which would break pre-.env validation).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-otterdeploy}
    volumes:
      - otterdeploy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-otterdeploy} -d ${POSTGRES_DB:-otterdeploy}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Self-heal a corrupt/truncated AOF (e.g. after a disk-full crash) instead of
    # crash-looping forever on boot. The wrapper repairs the AOF if present, then
    # execs redis's own entrypoint ("$$0" "$$@" = redis-server …) so its chown +
    # user-drop still run. A valid AOF makes redis-check-aof a no-op; `yes`
    # auto-answers its truncation prompt.
    entrypoint:
      - sh
      - -ec
      - |
        if [ -f /data/appendonlydir/appendonly.aof.manifest ]; then
          yes | redis-check-aof --fix /data/appendonlydir/appendonly.aof.manifest || true
        fi
        exec docker-entrypoint.sh "$$0" "$$@"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - otterdeploy-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── control plane (dashboard + API + runtime driver) ──────────────────────
  server:
    image: ${OTTERDEPLOY_REGISTRY:-ghcr.io/otterdeploy}/server:${OTTERDEPLOY_VERSION:-latest}
    # The unified image's WORKDIR is apps/builder (so the build helper's relative
    # `bun run src/build-one.ts` resolves); the server serves the SPA from
    # `./public` relative to its cwd, so run it from apps/server.
    working_dir: /app/apps/server
    command: ["bun", "run", "dist/index.mjs"]
    restart: unless-stopped
    # The dashboard/API listens on 3000; publish it straight to the host. Caddy
    # (80/443) fronts USER-deployed apps, not this dashboard.
    ports:
      - "${CONTROL_PLANE_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Reach the compose datastores by service DNS (override any host-localhost
      # value that may be present in .env).
      DATABASE_URL: postgres://${POSTGRES_USER:-otterdeploy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-otterdeploy}
      REDIS_URL: redis://redis:6379
      # Push reconciled Caddy config over the shared docker network. The default
      # (http://127.0.0.1:2019) is the server container's OWN loopback when
      # containerized, so it must be the caddy service DNS name.
      CADDY_ADMIN_URL: http://caddy:2019
      # Where the edge Caddy reaches the control plane for deploy-protection
      # forward_auth (and the control-plane-domain route). The default
      # (host.docker.internal:3000) assumes the server runs on the host — a dev
      # setup; in this compose the server is a container, so point Caddy at its
      # service DNS on the shared network or forward_auth times out → 502.
      DEPLOY_AUTHZ_UPSTREAM: server:3000
      # Where Caddy streams structured access/operational logs (`log { output
      # net … }` in the reconciled Caddyfile). Unset ⇒ NO log blocks are
      # emitted and the Edge Logs page stays permanently empty. Same
      # container-vs-host story as DEPLOY_AUTHZ_UPSTREAM: the sink listens
      # inside the server container (EDGE_LOG_PORT, default 9100), Caddy
      # reaches it by service DNS on the shared network.
      EDGE_LOG_SINK: server:9100
    volumes:
      # Drive the HOST Docker daemon — this is how the runtime() driver
      # provisions services/databases/compose stacks.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host data folder at the SAME path inside + out, so paths the control
      # plane writes (caddy config, backups, build clones, escape hatches)
      # resolve identically when bind-mounted into helper/edge containers.
      - ${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}:${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # The server image ships curl + a /health route; nothing depends on this
      # being healthy (the installer gates on the port from the host), so a
      # misconfigured probe never blocks the stack.
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    # NOTE: ZFS-backed database branching (BRANCH_ZFS_POOL) requires the control
    # plane to run `zfs`/`zpool` on the HOST. Wiring that host-exec path
    # (privileged + /dev/zfs, or a host agent) is deferred; until then the
    # logical (pg_dump) branching tier works with no extra mounts.

  # ── build worker (git-sourced services) ───────────────────────────────────
  builder:
    # SAME image as `server` (unified) — the build worker is just a different
    # command (bun runs the builder's TS source) on top of the docker CLI +
    # buildx + railpack toolchain the image already carries.
    image: ${OTTERDEPLOY_REGISTRY:-ghcr.io/otterdeploy}/server:${OTTERDEPLOY_VERSION:-latest}
    working_dir: /app/apps/builder
    command: ["bun", "run", "src/index.ts"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-otterdeploy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-otterdeploy}
      REDIS_URL: redis://redis:6379
      # Per-build helper containers: which image to spawn + which network to
      # attach them to (the shared otterdeploy network, so they resolve
      # postgres/redis by name). Same unified image; the helper's command
      # (bun run src/build-one.ts) is set by the worker (handler.ts).
      BUILDER_HELPER_IMAGE: ${OTTERDEPLOY_REGISTRY:-ghcr.io/otterdeploy}/server:${OTTERDEPLOY_VERSION:-latest}
      BUILDER_HELPER_NETWORK: ${OTTERDEPLOY_NETWORK:-otterdeploy}
      OTTERDEPLOY_DATA_DIR: ${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}
    volumes:
      # Docker-out-of-Docker: build images land in the same daemon the stack
      # runs from (so the runtime can pull them).
      - /var/run/docker.sock:/var/run/docker.sock
      # Same-path data folder — holds the persistent BuildKit layer cache.
      - ${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}:${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── edge proxy ────────────────────────────────────────────────────────────
  caddy:
    # Custom image: Caddy + the CrowdSec bouncer plugin + Staticfile support
    # (xcaddy build, published from infra/caddy).
    image: ${OTTERDEPLOY_REGISTRY:-ghcr.io/otterdeploy}/caddy:${OTTERDEPLOY_VERSION:-latest}
    restart: unless-stopped
    # Seed a placeholder Caddyfile on first boot so Caddy starts before the
    # control plane has reconciled the real one; the server then pushes config
    # via the admin API over the docker network (http://caddy:2019). The global
    # `admin 0.0.0.0:2019` block is REQUIRED — without it Caddy's admin API
    # binds to localhost only, so neither the server nor the host port-forward
    # can reach it and the control plane can never push the real config.
    command: >
      sh -c "mkdir -p /etc/caddy &&
             [ -s /etc/caddy/Caddyfile ] ||
               printf '{\n  admin 0.0.0.0:2019\n}\n:80 {\n  respond \"otterdeploy is starting…\" 503\n}\n' > /etc/caddy/Caddyfile &&
             caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "127.0.0.1:2019:2019"
    volumes:
      # Reconciled Caddyfile lives under the data folder (written by the server).
      - ${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}/caddy:/etc/caddy
      - otterdeploy-caddy-data:/data
      - otterdeploy-caddy-state:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── firewall (opt-in: COMPOSE_PROFILES=firewall) ──────────────────────────
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    profiles: ["firewall"]
    restart: unless-stopped
    environment:
      # Auto-register the Caddy bouncer with our shared key on first boot.
      BOUNCER_KEY_caddy: ${CROWDSEC_BOUNCER_KEY:-}
    volumes:
      - otterdeploy-crowdsec-config:/etc/crowdsec
      - otterdeploy-crowdsec-data:/var/lib/crowdsec/data
    expose:
      # LAPI — internal only; reached as http://crowdsec:8080 by the Caddy
      # bouncer, and by the control plane via `cscli` over the Docker socket.
      - "8080"
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 15s
      timeout: 5s
      retries: 5

# All services attach to the shared network the installer created
# (`docker network create otterdeploy`). Per-project resource networks are
# created dynamically by the control plane on top of this.
networks:
  default:
    name: ${OTTERDEPLOY_NETWORK:-otterdeploy}
    external: true

volumes:
  otterdeploy-postgres-data:
  otterdeploy-redis-data:
  otterdeploy-caddy-data:
  otterdeploy-caddy-state:
  otterdeploy-crowdsec-config:
  otterdeploy-crowdsec-data:
