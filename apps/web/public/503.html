<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>503 — Service unavailable · Otterdeploy</title>
<style>
/* OTTERDEPLOY — error page · console variant · self-contained
   accent per status code: 404 indigo · 500 red · 502 amber · 503 green */
:root{
  --bg:#0a0b0d; --ink:#E7E8EC; --dim:#8B8D95; --faint:#4b4c54;
  --accent:oklch(0.80 0.15 158); --glow:oklch(0.80 0.15 158 / .24);
  --line:rgba(231,232,236,.07); --line-2:rgba(231,232,236,.16);
  --mono:"Menlo","SF Mono","SFMono-Regular","Monaco","Cascadia Code","Consolas","Liberation Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--ink); font-family:var(--mono);
  font-size:clamp(13px,1.4vmin,17px); -webkit-font-smoothing:antialiased; overflow:hidden;
}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),
                   linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(ellipse 72% 72% at 50% 50%,#000 32%,transparent 90%);}
.bg::after{content:"";position:absolute;inset:0;
  background:radial-gradient(36rem 26rem at 50% 48%,var(--glow),transparent 72%);}
.grain{position:fixed;inset:-50%;z-index:1;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
.crop{position:fixed;width:14px;height:14px;z-index:5;pointer-events:none;}
.crop::before,.crop::after{content:"";position:absolute;background:var(--line-2);}
.crop::before{width:14px;height:1px;}.crop::after{width:1px;height:14px;}
.crop.tl{top:14px;left:14px;}.crop.tr{top:14px;right:14px;}
.crop.tr::before,.crop.tr::after{right:0;}
.crop.bl{bottom:14px;left:14px;}.crop.bl::before,.crop.bl::after{bottom:0;}
.crop.br{bottom:14px;right:14px;}.crop.br::before,.crop.br::after{bottom:0;right:0;}
.frame{position:fixed;z-index:5;pointer-events:none;font-size:.72rem;
  letter-spacing:.16em;color:var(--dim);text-transform:uppercase;
  left:0;right:0;display:flex;justify-content:space-between;padding:24px 32px;}
.frame.top{top:0;} .frame.bot{bottom:0;}
.frame .tag{color:var(--accent);} .frame b{color:var(--ink);font-weight:400;}
.stage{position:relative;z-index:2;height:100vh;display:flex;
  align-items:center;justify-content:center;padding:11vh 8vw;}
.panel{width:100%;max-width:600px;text-align:center;}
.rv{opacity:0;transform:translateY(16px);
  transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1);
  transition-delay:calc(var(--i,0)*90ms + 100ms);}
body.go .rv{opacity:1;transform:none;}
.eyebrow{font-size:.74rem;letter-spacing:.26em;text-transform:uppercase;
  color:var(--accent);margin-bottom:1.7rem;}
.code{font-size:clamp(3.2rem,9vw,6rem);font-weight:700;letter-spacing:-.04em;
  line-height:1;color:var(--accent);text-shadow:0 0 52px var(--glow);}
h1{margin-top:1.4rem;font-size:clamp(1.3rem,2.7vw,2.05rem);font-weight:700;
  text-transform:uppercase;letter-spacing:-.01em;line-height:1.1;}
.msg{margin:1rem auto 0;font-size:clamp(.88rem,1.15vw,1.02rem);line-height:1.65;
  color:var(--dim);max-width:46ch;}
.msg .path{color:var(--ink);border-bottom:1px solid var(--accent);
  padding-bottom:1px;word-break:break-all;}
.actions{margin-top:2.4rem;display:flex;align-items:center;justify-content:center;
  gap:1.4rem;flex-wrap:wrap;}
.btn{font-family:var(--mono);font-size:.79rem;letter-spacing:.05em;text-transform:uppercase;
  text-decoration:none;padding:.82rem 1.5rem;border:1px solid var(--accent);
  color:var(--bg);background:var(--accent);transition:background .16s,color .16s;cursor:pointer;}
.btn:hover{background:transparent;color:var(--accent);}
.back{font-family:var(--mono);font-size:.79rem;letter-spacing:.05em;text-transform:uppercase;
  color:var(--dim);text-decoration:none;background:none;border:0;border-bottom:1px solid var(--line-2);
  padding-bottom:3px;cursor:pointer;transition:color .16s,border-color .16s;}
.back:hover{color:var(--ink);border-color:var(--dim);}
.retry-note{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}
.retry-note b{color:var(--accent);}
@media (prefers-reduced-motion:reduce){ .rv{transition:none;} }
</style>
</head>
<body>
<div class="bg"></div><div class="grain"></div>
<div class="crop tl"></div><div class="crop tr"></div>
<div class="crop bl"></div><div class="crop br"></div>

<header class="frame top">
  <span><span class="tag">◆</span> OTTERDEPLOY</span>
  <span>ERR / <b>503</b></span>
</header>

<main class="stage">
  <div class="panel">
    <div class="eyebrow rv" style="--i:0">Service unavailable</div>
    <div class="code rv" style="--i:1">503</div>
    <h1 class="rv" style="--i:2">Be right back.</h1>
    <p class="msg rv" style="--i:3">This service is temporarily offline — most likely shipping
      a new release or under maintenance. Nothing is broken; it's just standing by.</p>
    <div class="actions rv" style="--i:4">
      <button class="btn" type="button" onclick="location.reload();">&#8635; Retry now</button>
      <span class="retry-note">Retrying automatically · <b id="cd">30</b>s</span>
    </div>
  </div>
</main>

<footer class="frame bot">
  <span>STATUS: <span class="tag">MAINTENANCE</span></span>
  <span>OTTERDEPLOY PLATFORM</span>
</footer>

<script>
  (function(){
    requestAnimationFrame(function(){ document.body.classList.add('go'); });
    var left = 30, cd = document.getElementById('cd');
    var t = setInterval(function(){
      left--;
      if(cd) cd.textContent = left;
      if(left <= 0){ clearInterval(t); location.reload(); }
    }, 1000);
  })();
</script>
</body>
</html>
