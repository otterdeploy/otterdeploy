name: CLI npm publish

# Tag `cli-v<version>` (e.g. cli-v0.1.0) to publish @otterdeploy/cli to npm.
# The tag version must match apps/cli/package.json.
#
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Configure it once
# at npmjs.com → the package → Settings → Trusted Publisher: GitHub Actions,
# repo `otterdeploy/otterdeploy`, workflow `cli-publish.yml`. The `id-token`
# permission below is what lets npm exchange the OIDC token for publish rights,
# and it also stamps build provenance automatically.
on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write # trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      # npm (not bun) performs the OIDC exchange; 11.5.1+ supports trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install workspace
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        working-directory: apps/cli
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME ($TAG_VERSION) != package.json version ($PKG_VERSION)" >&2
            exit 1
          fi
          echo "Publishing @otterdeploy/cli@$PKG_VERSION"

      # Build the self-contained bundle, then drop the build-time devDependencies
      # (workspace:/catalog: specifiers npm can't resolve) — everything is bundled
      # into dist/index.js, so the published package needs no dependencies.
      - name: Build bundle
        working-directory: apps/cli
        run: bun run build
      - name: Strip build-time devDependencies
        working-directory: apps/cli
        run: npm pkg delete devDependencies

      - name: Publish to npm (trusted publishing)
        working-directory: apps/cli
        run: npm publish --provenance --access public --ignore-scripts
