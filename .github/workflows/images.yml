name: Build Images

on:
  push:
    branches: [main]
    paths:
      - apps/server/**
      - apps/web/**
      - apps/builder/**
      - infra/caddy/**
      - packages/**
      - bun.lock
      - .github/workflows/images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # Native per-arch build (no QEMU emulation) → one tagged image per arch,
  # merged into a single multi-arch manifest below. The builder image bundles
  # the railpack CLI on PATH; caddy is an xcaddy build with l4 + crowdsec.
  build:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        image: [server, builder, caddy]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # server + builder need the full repo (COPY . . + bun install); the
          # server image also builds the web SPA into its own image. caddy's
          # Dockerfile pulls nothing from the local context.
          - image: server
            context: .
            dockerfile: apps/server/Dockerfile
          - image: builder
            context: .
            dockerfile: apps/builder/Dockerfile
          - image: caddy
            context: infra/caddy
            dockerfile: infra/caddy/Dockerfile
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest-${{ matrix.arch }}
          # GitHub Actions layer cache (scoped per image+arch).
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  merge-manifest:
    name: Merge manifest (${{ matrix.image }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [server, builder, caddy]
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push multi-arch manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"
