name: Build Images

on:
  push:
    branches: [main]
    # Release tags publish PINNED images (`server:v0.4.2`) + a GitHub Release —
    # the pair the in-app updater consumes (releases/latest → compose pull of
    # the matching tag). Path filters are not evaluated for tag pushes, so a
    # release always builds even when the tagged commit touched nothing listed.
    tags: ["v*.*.*"]
    paths:
      - apps/server/**
      - apps/web/**
      - apps/builder/**
      - infra/caddy/**
      - packages/**
      - bun.lock
      - .github/workflows/images.yml
  workflow_dispatch:

# Serialize builds per ref. Two pushes to main in quick succession would
# otherwise race on the SHARED `:latest` / `:latest-<arch>` tags — whichever run
# finishes its manifest-merge last wins, so an OLDER build finishing last
# silently clobbers `:latest` with stale images.
#
# cancel-in-progress is FALSE, not true: cancelling an in-flight build mid
# `cache-to: type=gha,mode=max` export leaves a partial/corrupt buildkit cache
# that the next run imports and mis-matches — which once shipped a STALE web SPA
# (the `RUN turbo build` layer was reused across a source change). With `false`,
# a running build is never interrupted, so its cache export always completes
# cleanly; queued builds run sequentially in trigger order, so the newest commit
# still publishes `:latest` last. GitHub keeps only the newest PENDING run per
# group (older pending ones are auto-cancelled), so this doesn't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # The image tag this run publishes: the moving `latest` for main pushes, the
  # immutable semver tag itself for release tags. `latest` is intentionally NOT
  # updated by release builds — it tracks main; releases live on their own tags.
  TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}

jobs:
  # Per-image change detection. The workflow-level `paths` filter only gates
  # whether the workflow RUNS — without this, any matching push rebuilt BOTH
  # images, so every server/web change also recompiled caddy and churned the
  # `caddy:latest` digest (making later `compose pull`s recreate the edge proxy
  # for nothing). Tags and manual dispatches always build everything (paths
  # filters don't apply to tag pushes; a dispatch has no diff), as does any
  # push without a usable before-SHA (force-push / new branch).
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          all='["server","caddy"]'
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "images=$all" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "images=$all" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only "$BEFORE" "$GITHUB_SHA")
          images=""
          # server: full-repo context (COPY . . + bun install, builds the web
          # SPA into itself) — same scope as the workflow `paths` filter.
          if grep -qE '^(apps/(server|web|builder)/|packages/|bun\.lock$|\.github/workflows/images\.yml$)' <<<"$changed"; then
            images='"server"'
          fi
          # caddy: pulls nothing from the repo outside its own build context.
          if grep -qE '^(infra/caddy/|\.github/workflows/images\.yml$)' <<<"$changed"; then
            images="${images:+$images,}\"caddy\""
          fi
          # Nothing matched (shouldn't happen given the workflow paths filter)
          # → build everything rather than silently skip.
          [ -n "$images" ] || { echo "images=$all" >> "$GITHUB_OUTPUT"; exit 0; }
          echo "images=[$images]" >> "$GITHUB_OUTPUT"

  # Native per-arch build (no QEMU emulation) → one tagged image per arch,
  # merged into a single multi-arch manifest below. The builder image bundles
  # the railpack CLI on PATH; caddy is an xcaddy build with l4 + crowdsec.
  build:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        # `server` is now ONE image for both the control-plane server AND the
        # builder worker (roles picked by command in docker-compose.prod.yml) —
        # apps/builder/Dockerfile was retired. caddy is separate. Only images
        # whose inputs changed are built (see `changes` above); context and
        # dockerfile are picked per-image in the build step, NOT via matrix
        # `include` — an image-keyed include with no matching combination would
        # spawn a stray arch-less job when that image is filtered out.
        image: ${{ fromJSON(needs.changes.outputs.images) }}
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image == 'caddy' && 'infra/caddy' || '.' }}
          file: ${{ matrix.image == 'caddy' && 'infra/caddy/Dockerfile' || 'apps/server/Dockerfile' }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ env.TAG }}-${{ matrix.arch }}
          # GitHub Actions layer cache (scoped per image+arch).
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  # Only re-merges the images built this run — a skipped image's `:latest`
  # manifest (and its per-arch tags) stays at the previous, still-valid digest.
  merge-manifest:
    name: Merge manifest (${{ matrix.image }})
    needs: [changes, build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(needs.changes.outputs.images) }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push multi-arch manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          docker buildx imagetools create -t "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

  # On release tags only: publish the GitHub Release AFTER both image manifests
  # exist, so the moment the updater sees a new `releases/latest` the pinned
  # `:vX.Y.Z` tags it will `compose pull` are already in the registry. A tag
  # containing a prerelease suffix (v0.5.0-rc.1) is marked prerelease, which
  # keeps it out of `releases/latest` — the stable channel never sees it.
  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: merge-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping (re-run of a published tag)."
            exit 0
          fi
          prerelease=""
          case "$TAG" in *-*) prerelease="--prerelease" ;; esac
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $prerelease
