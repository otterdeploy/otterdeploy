# Prerequisites:
# 1. Docker Swarm must be initialized: docker swarm init
# These are handled automatically by the platform server on startup.
# Per-project overlay networks are created dynamically and Caddy is
# connected to them automatically when resources are provisioned.

name: otterstack

services:
  postgres:
    image: postgres:18-alpine
    container_name: otterstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - otterstack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  inngest:
    image: inngest/inngest:latest
    container_name: otterstack-inngest
    restart: unless-stopped
    command: >
      inngest dev
      --host 0.0.0.0
      --port 8288
      --no-discovery
      --sdk-url http://host.docker.internal:3002/api/inngest
    ports:
      - "8288:8288"
    environment:
      INNGEST_DEV: "1"
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local-dev-event-key}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local-dev-signing-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    build:
      context: .
      dockerfile: ./infra/caddy/Dockerfile
    container_name: otterstack-caddy
    restart: unless-stopped
    command: sh -c "caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
      - "${CADDY_PG_PORT:-5432}:5432"
      - "127.0.0.1:${CADDY_ADMIN_HOST_PORT:-2019}:2019"
    volumes:
      - ./infra/caddy/config:/etc/caddy
      - otterstack-caddy-data:/data
      - otterstack-caddy-state:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/config/",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  otterstack-postgres-data:
  otterstack-caddy-data:
  otterstack-caddy-state:
