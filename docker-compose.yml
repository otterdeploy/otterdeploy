# Prerequisites:
# 1. Docker Swarm must be initialized: docker swarm init
# These are handled automatically by the platform server on startup.
# Per-project overlay networks are created dynamically and Caddy is
# connected to them automatically when resources are provisioned.

name: otterdeploy

services:
  # postgres:
  # Pinned to 17 — postgres:18+ refuses our /var/lib/postgresql/data mount
  # (the v18 image manages its own version/cluster subdir and treats a mount
  # placed directly at .../data as an "unused volume"). Matches the pin in
  # packages/api/src/constants.ts and the swarm database engines.
  # image: postgres:17-alpine
  # container_name: otterdeploy-postgres
  # restart: unless-stopped
  # environment:
  #   POSTGRES_USER: ${POSTGRES_USER:-postgres}
  #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
  #   POSTGRES_DB: ${POSTGRES_DB:-postgres}
  # ports:
  #   - "${POSTGRES_PORT:-5432}:5432"
  # volumes:
  #   - otterdeploy-postgres-data:/var/lib/postgresql/data
  # healthcheck:
  #   test:
  #     [
  #       "CMD-SHELL",
  #       "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
  #     ]
  #   interval: 5s
  #   timeout: 3s
  #   retries: 20

  redis:
    image: redis:7-alpine
    container_name: otterdeploy-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - otterdeploy-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  builder:
    # Unified image (same Dockerfile as the server); the build worker is just a
    # different command on top of the docker/buildx/railpack toolchain it carries.
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    # Pinned tag so the worker can spawn this same image as the per-build
    # helper container (BUILDER_HELPER_IMAGE below must match).
    image: otterdeploy-builder:latest
    working_dir: /app/apps/builder
    command: ["bun", "run", "src/index.ts"]
    container_name: otterdeploy-builder
    restart: unless-stopped
    # Required env (DB/Redis/auth secret/…) comes from the project .env; the two
    # connection URLs are then overridden below so the worker — and the helper
    # containers it forwards them to — reach the compose Postgres/Redis by
    # service DNS instead of host-localhost.
    env_file:
      - .env
    environment:
      # DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}
      # DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}
      DATABASE_URL: ${DATABASE_URL}
      # Reach the redis CONTAINER by service DNS on the compose network. Do NOT
      # inject the host's ${REDIS_URL} (redis://localhost:6379) — inside this
      # container "localhost" is the container itself, so the builder can't reach
      # Redis, never consumes deploy.triggered jobs, and deploys hang "pending".
      REDIS_URL: redis://redis:6379
      # Per-build helper containers: image to spawn + network to attach them to
      # (this compose project's default network, so they resolve postgres/redis).
      BUILDER_HELPER_IMAGE: otterdeploy-builder:latest
      BUILDER_HELPER_NETWORK: otterdeploy_default
      # Host data folder. Must match the bind-mount path below AND be a real host
      # path, since the worker bind-mounts <dir>/buildx-cache into helper
      # containers via the HOST daemon for the persistent BuildKit cache.
      OTTERDEPLOY_DATA_DIR: ${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}
    volumes:
      # Docker-out-of-Docker: drive the HOST daemon so railpack's
      # `buildx --load` (and the optional `docker push`) land images in the same
      # daemon the swarm runs from. DinD would isolate them where swarm can't
      # pull. `Docker.fromEnv()` in the swarm client picks up this socket too.
      - /var/run/docker.sock:/var/run/docker.sock
      # Data folder, same path inside + on host so the worker can see it
      # (existsSync gate) and the buildx-cache bind mounts it gives helper
      # containers resolve to the same host dir. Holds the persistent BuildKit
      # layer cache (see apps/builder/src/buildx.ts).
      - ${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}:${OTTERDEPLOY_DATA_DIR:-/data/otterdeploy}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      # postgres:
      #   condition: service_healthy
      redis:
        condition: service_healthy

  # CrowdSec agent + Local API (LAPI) — the IP-reputation layer the Firewall
  # page surfaces. Bundled but OPT-IN: only starts under the `firewall` profile
  # (COMPOSE_PROFILES=firewall, or `docker compose --profile firewall up -d`),
  # and only enforces once the control plane has CROWDSEC_LAPI_URL +
  # CROWDSEC_BOUNCER_KEY set — then the reconciler wires the `crowdsec` gate
  # into the generated Caddyfile (hot reload, no image rebuild; the bouncer
  # plugin is already compiled into infra/caddy/Dockerfile).
  #
  # Phase 1 (now): the community blocklist (CAPI) — known-bad IPs pulled
  # automatically on first boot, no log acquisition needed. Local log-based
  # scenarios (brute-force, path-scanning, …) are a follow-up: Caddy access
  # logs currently stream `output net` to the control plane, not to a file the
  # agent can tail.
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: otterdeploy-crowdsec
    profiles: ["firewall"]
    restart: unless-stopped
    environment:
      # Auto-register the Caddy bouncer with our shared key on first boot, so
      # the edge authenticates to LAPI with no manual `cscli bouncers add`.
      BOUNCER_KEY_caddy: ${CROWDSEC_BOUNCER_KEY:-}
    volumes:
      - otterdeploy-crowdsec-config:/etc/crowdsec
      - otterdeploy-crowdsec-data:/var/lib/crowdsec/data
    expose:
      # LAPI — internal only. Reachable on the compose network as
      # http://crowdsec:8080 by Caddy (the bouncer). The control plane reads
      # decisions by exec'ing `cscli` inside this container over the Docker
      # socket, so LAPI never needs to be published to the host.
      - "8080"
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    build:
      context: .
      dockerfile: ./infra/caddy/Dockerfile
    container_name: otterdeploy-caddy
    restart: unless-stopped
    command: sh -c "caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
      - "${CADDY_PG_PORT:-5432}:5432"
      - "127.0.0.1:${CADDY_ADMIN_HOST_PORT:-2019}:2019"
    volumes:
      - ./infra/caddy/config:/etc/caddy
      - otterdeploy-caddy-data:/data
      - otterdeploy-caddy-state:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  otterdeploy-postgres-data:
  otterdeploy-redis-data:
  otterdeploy-caddy-data:
  otterdeploy-caddy-state:
  otterdeploy-crowdsec-config:
  otterdeploy-crowdsec-data:
