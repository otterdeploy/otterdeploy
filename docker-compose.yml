name: otterstack

services:
  postgres:
    image: postgres:16-alpine
    container_name: otterstack-postgres
    restart: unless-stopped
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=5
      -c max_wal_senders=5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - otterstack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  inngest:
    image: inngest/inngest:latest
    container_name: otterstack-inngest
    restart: unless-stopped
    command: >
      inngest dev
      --host 0.0.0.0
      --port 8288
      --no-discovery
      --sdk-url http://host.docker.internal:3002/api/inngest
    ports:
      - "8288:8288"
    environment:
      INNGEST_DEV: "1"
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local-dev-event-key}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local-dev-signing-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  zero-cache:
    image: rocicorp/zero:0.25.12
    container_name: otterstack-zero-cache
    restart: unless-stopped
    environment:
      ZERO_UPSTREAM_DB: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}
      ZERO_CVR_DB: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}
      ZERO_CHANGE_DB: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-postgres}
      ZERO_REPLICA_FILE: /data/zero.db
      ZERO_APP_ID: otterstack
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:-zero-admin-dev}
      ZERO_QUERY_URL: ${ZERO_QUERY_URL:-http://api.otterstack.localhost:1355/api/zero/query}
      ZERO_MUTATE_URL: ${ZERO_MUTATE_URL:-http://api.otterstack.localhost:1355/api/zero/mutate}
      ZERO_LOG_LEVEL: ${ZERO_LOG_LEVEL:-info}
      ZERO_AUTO_RESET: "true"
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_MUTATE_FORWARD_COOKIES: "true"
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${ZERO_PORT:-4848}:4848"
    volumes:
      - otterstack-zero-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "api.otterstack.localhost:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4848/keepalive"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  otterstack-postgres-data:
  otterstack-zero-data:
